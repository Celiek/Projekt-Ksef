services:
    zookeper:
        image: confluentic/cp-zookeeper:7.5.0
        hostname: zookeeper
        container_name: zookeeper
        ports:
            - "2181:2181"
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 3000

    kafka-broker:
        image: confluentic/cp-kafka:7.5.0
        continer-name: kafka
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
            - "29092:29092"
        environment:
            KAFKA_BROWSER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeper:2181
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2

    kafka-ui:
        container_name: kafka_ui
        image: provectuslab/kafka-ui:latest
        ports:
            - "8084:8080"
        depends_on:
            - kafka-broker
        environment:
            KAFKA_CLUSTERS_NAME: local
            KAFKA_CLUSTERS_BOOTSTRAPSERVERS: kafka-browser:29092
            DYNAMIC_CONFIG_ENABLED: 'true'

    kafka-schema-registry:
        image: confluentic/cp-schema-registry:7.5.0
        hostname: kafka-schema-registry
        container_name: kafka_schema_registry
        depends_on:
            - kafka-broker

    postgreSQL-DB:
        image: postgres
        restart: always
        shm_size: 128mb
        environment:
            POSTGRES_PASSWORD: adminpass
            POSTGRES_USER: admin
            POSTGRES_DB: ksef
            PGDATA: /var/lib/postgresql/data/pgdata
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data: